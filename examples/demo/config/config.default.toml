[app]
name = "Arcx"
version = "0.1.0"
env = "dev"
debug = false

[server]
host = "127.0.0.1"
port = 8765

# === 日志系统 ===
[logger]
level = "info"
dir = "logs"
enable_console = true
enable_file = false

# === HTTP 客户端 ===
[httpclient]
timeout = 30
max_retries = 0
user_agent = "Arcx/0.1"
connect_timeout = 10

# === CORS ===
[cors]
enable = true
# allowed_origins = ["http://localhost:3000"]
# allowed_methods = ["GET", "POST", "PUT", "DELETE"]
# allowed_headers = ["Content-Type", "Authorization"]
# allow_credentials = false
# max_age = 86400

# === 请求日志 ===
[request_logger]
enable = true

# === 安全中间件 ===
[security]
enable = true
csrf = false
xss_protection = true
frame_deny = true
content_type_nosniff = true
hsts = false
hsts_max_age = 31536000
csrf_ignore = ["/api/webhook"]

# === Session ===
# [session]
# secret = "your-secret-key-at-least-32-characters!!"
# cookie_name = "arcx.sid"
# max_age = 86400
# http_only = true
# secure = false
# same_site = "lax"

# === 插件配置 ===
[plugin.database]
enable = false
url = "sqlite:./data.db?mode=rwc"
max_connections = 10
min_connections = 1

[plugin.jwt]
enable = false
secret = "change-me-in-production"
expire = 86400

# === 定时任务 ===
[schedule]
enable = false
